<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Thêm dịch vụ</title>
    <link rel="stylesheet" th:href="@{/css/quanlydichvu/add.css}">
</head>
<body>
<div layout:fragment="content" class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-9">

            <div class="mb-4">
                <h2 style="font-weight:800; color:#1e293b; letter-spacing: -1px;">
                    <i class="bi bi-plus-circle-fill me-2 text-primary"></i>Thêm dịch vụ mới
                </h2>
                <p class="text-muted">Tạo danh mục dịch vụ mới cho cư dân trong tòa nhà.</p>
            </div>

            <div class="form-card">
                <form th:action="@{/quan-ly-dich-vu/save}" th:object="${service}" method="post" enctype="multipart/form-data">

                    <div class="section-title">1. Thông tin cơ bản</div>
                    <div class="row">
                        <div class="col-md-8 mb-3">
                            <label for="name" class="form-label">Tên dịch vụ <span class="text-danger">*</span></label>
                            <input class="form-control" type="text" id="name" th:field="*{name}" required placeholder="Ví dụ: Vệ sinh căn hộ định kỳ">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="categoryId" class="form-label">Nhóm dịch vụ</label>
                            <select class="form-select" id="categoryId" th:field="*{category.id}">
                                <option value="">-- Chọn nhóm --</option>
                                <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="description" class="form-label">Mô tả chi tiết</label>
                        <textarea class="form-control" id="description" th:field="*{description}" rows="3" placeholder="Ghi chú về dịch vụ..."></textarea>
                    </div>

                    <div class="section-title">2. Cung cấp & Định mức</div>
                    <div class="row mb-4">
                        <div class="col-md-6 mb-3">
                            <label for="provider" class="form-label">Nhà cung cấp</label>
                            <input class="form-control" type="text" id="provider" th:field="*{provider}" placeholder="Ví dụ: Công ty vệ sinh X">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="unit" class="form-label">Đơn vị tính</label>
                            <input class="form-control" type="text" id="unit" th:field="*{unit}" placeholder="Lần, Tháng, kWh...">
                        </div>
                    </div>

                    <div class="section-title">3. Chính sách giá</div>
                    <div class="row mb-4">
                        <div class="col-md-4 mb-3">
                            <label for="costType" class="form-label">Loại phí</label>
                            <select class="form-select" id="costType" th:field="*{costType}">
                                <option value="">-- Chọn loại --</option>
                                <option value="CO_DINH">Cố định</option>
                                <option value="THEO_SO_LUONG">Theo số lượng</option>
                                <option value="THEO_DIEN_TICH">Theo diện tích</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="costValue" class="form-label">Giá gốc (Hệ thống)</label>
                            <input class="form-control" type="number" step="1000" id="costValue" th:field="*{costValue}" placeholder="0">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="displayPrice" class="form-label">Giá hiển thị (VND) <span class="text-danger">*</span></label>
                            <input class="form-control fw-bold text-primary" type="text" id="displayPrice" oninput="formatCurrency(this)" placeholder="0">
                            <input type="hidden" th:field="*{price}" id="price">
                        </div>
                    </div>

                    <div class="section-title">4. Hình ảnh đại diện</div>
                    <div class="d-flex align-items-center gap-4 mb-5">
                        <div class="service-preview-box" id="previewContainer">
                            <i id="placeholderIcon" class="bi bi-image text-muted fs-1"></i>
                            <img id="previewImg" style="display:none;" alt="preview">
                        </div>
                        <div class="flex-grow-1">
                            <label for="imageFile" class="form-label">Chọn tệp hình ảnh</label>
                            <input class="form-control" type="file" id="imageFile" name="imageFile" accept="image/*" onchange="previewServiceImage(event)">
                            <small class="text-muted d-block mt-2">Dung lượng tối đa 2MB. Hỗ trợ JPG, PNG.</small>
                        </div>
                    </div>

                    <div class="d-flex justify-content-center gap-3 pt-4 border-top">
                        <button type="submit" class="btn-modern btn-save">
                            <i class="bi bi-cloud-check"></i> Lưu dịch vụ
                        </button>
                        <a th:href="@{/quan-ly-dich-vu}" class="btn-modern btn-light border text-secondary">
                            <i class="bi bi-x-circle"></i> Hủy bỏ
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/product.js}" defer></script>
<script th:src="@{/js/service-image-preview.js}" defer></script>
</body>
</html>
