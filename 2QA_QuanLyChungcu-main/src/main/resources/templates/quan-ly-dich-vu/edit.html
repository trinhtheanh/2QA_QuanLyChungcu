<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Chỉnh sửa dịch vụ</title>
    <link rel="stylesheet" th:href="@{/css/quanlydichvu/edit.css}">
</head>
<body>
<div layout:fragment="content" class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-9">

            <div class="mb-4">
                <h2 style="font-weight:800; color:#1e293b; letter-spacing: -1px;">
                    <i class="bi bi-pencil-square me-2" style="color:#f59e0b;"></i>Chỉnh sửa dịch vụ
                </h2>
                <p class="text-muted">Cập nhật thông tin chi tiết hoặc đơn giá của dịch vụ #[[${service.id}]].</p>
            </div>

            <div class="form-card">
                <form th:action="@{/quan-ly-dich-vu/save}" th:object="${service}" method="post" enctype="multipart/form-data">
                    <input type="hidden" th:field="*{id}"/>

                    <div class="section-title">1. Thông tin chung</div>
                    <div class="row">
                        <div class="col-md-8 mb-3">
                            <label for="name" class="form-label">Tên dịch vụ <span class="text-danger">*</span></label>
                            <input class="form-control" type="text" id="name" th:field="*{name}" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="categoryId" class="form-label">Nhóm dịch vụ</label>
                            <select class="form-select" id="categoryId" th:field="*{category.id}">
                                <option value="">-- Chọn nhóm --</option>
                                <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="description" class="form-label">Mô tả chi tiết</label>
                        <textarea class="form-control" id="description" th:field="*{description}" rows="3"></textarea>
                    </div>

                    <div class="section-title">2. Đối tác & Định mức</div>
                    <div class="row mb-4">
                        <div class="col-md-6 mb-3">
                            <label for="provider" class="form-label">Nhà cung cấp</label>
                            <input class="form-control" type="text" id="provider" th:field="*{provider}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="unit" class="form-label">Đơn vị tính</label>
                            <input class="form-control" type="text" id="unit" th:field="*{unit}">
                        </div>
                    </div>

                    <div class="section-title">3. Chính sách giá</div>
                    <div class="row mb-4">
                        <div class="col-md-4 mb-3">
                            <label for="costType" class="form-label">Loại phí</label>
                            <select class="form-select" id="costType" th:field="*{costType}">
                                <option value="">-- Chọn loại --</option>
                                <option value="CO_DINH">Cố định</option>
                                <option value="THEO_SO_LUONG">Theo số lượng</option>
                                <option value="THEO_DIEN_TICH">Theo diện tích</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="costValue" class="form-label">Giá gốc hệ thống</label>
                            <input class="form-control" type="number" step="1000" id="costValue" th:field="*{costValue}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="displayPrice" class="form-label">Giá bán (VND) <span class="text-danger">*</span></label>
                            <input class="form-control fw-bold text-primary" type="text" id="displayPrice" oninput="formatCurrency(this)">
                            <input type="hidden" th:field="*{price}" id="price">
                        </div>
                    </div>

                    <div class="section-title">4. Hình ảnh dịch vụ</div>
                    <div class="image-container mb-5">
                        <div th:if="*{imageUrl != null}">
                            <small class="d-block text-muted mb-2">Ảnh hiện tại:</small>
                            <div class="preview-box">
                                <img th:src="@{${service.imageUrl}}" alt="current">
                            </div>
                        </div>

                        <div>
                            <small class="d-block text-muted mb-2">Thay đổi ảnh mới:</small>
                            <div class="preview-box" id="newPreviewBox">
                                <i id="placeholderIcon" class="bi bi-plus-circle fs-1 text-muted"></i>
                                <img id="previewImg" style="display:none;">
                            </div>
                        </div>

                        <div class="flex-grow-1 align-self-end">
                            <input class="form-control" type="file" id="imageFile" name="imageFile" accept="image/*" onchange="previewServiceImage(event)">
                            <small class="text-muted mt-2 d-block">Để trống nếu không muốn thay đổi hình ảnh.</small>
                        </div>
                    </div>

                    <div class="d-flex justify-content-center gap-3 pt-4 border-top">
                        <button type="submit" class="btn-modern btn btn-warning text-white">
                            <i class="bi bi-arrow-repeat"></i> Cập nhật ngay
                        </button>
                        <a th:href="@{/quan-ly-dich-vu}" class="btn-modern btn btn-light border text-secondary">
                            <i class="bi bi-x-circle"></i> Hủy bỏ
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/product.js}" defer></script>
<script th:src="@{/js/service-image-preview.js}" defer></script>

<script th:src="@{/js/image-preview.js}" defer></script>
</body>
</html>
