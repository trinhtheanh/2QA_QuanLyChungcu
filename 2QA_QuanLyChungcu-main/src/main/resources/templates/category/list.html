<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
</head>
<body>
<div layout:fragment="content" class="container body-content">
    <h2 class="mt-3 mb-3">Danh sach chung cu</h2>

    <div class="mb-3 d-flex gap-2" sec:authorize="hasRole('ADMIN')">
        <a th:href="@{/products/add}" class="btn btn-primary">Them chung cu moi</a>
        <a th:href="@{/categories/add}" class="btn btn-secondary">Them loai chung cu</a>
    </div>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Ma</th>
            <th>Ten chung cu</th>
            <th>Hinh anh</th>
            <th>Gia (tham khao)</th>
            <th>Loai chung cu</th>
            <th sec:authorize="hasRole('ADMIN')"></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${products}">
            <td th:text="${product.id}"></td>
            <td th:text="${product.name}"></td>
            <td>
                <img th:if="${product.image != null and !#strings.isEmpty(product.image)}"
                     height="120" width="150"
                     th:src="@{${product.image}}" alt="anh chung cu"
                     style="object-fit:cover; border-radius:6px;">
                <span th:unless="${product.image != null and !#strings.isEmpty(product.image)}"
                      style="color:#aaa;">Chua co anh</span>
            </td>
            <td th:text="${product.price}"></td>
            <td th:text="${product.category != null} ? ${product.category.name} : ''"></td>
            <td sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-secondary btn-sm">Sua</a>
                <a th:href="@{/products/delete/{id}(id=${product.id})}" class="btn btn-danger btn-sm"
                   onclick="return confirm('Xoa chung cu nay?');">Xoa</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
