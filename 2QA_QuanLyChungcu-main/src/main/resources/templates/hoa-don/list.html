<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Hóa đơn</title>
    <style>
        .qr-image-auto {
            image-rendering: pixelated; /* Giúp mã QR sắc nét hơn khi scale */
            width: 100%;
            max-width: 280px; /* Kích thước tối ưu để quét */
            height: auto;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            padding: 10px;
            background: #fff;
        }
    </style>

</head>
<body>
<div layout:fragment="content" class="container body-content">
    <div class="mt-4 mb-4">
        <h2 style="font-weight:700; color:#1e293b; margin:0;">
            <i class="bi bi-receipt me-2" style="color:#059669;"></i>Hóa đơn căn hộ của tôi
        </h2>
        <p class="text-muted mb-0 mt-2">Bao gồm phí căn hộ + phí dịch vụ đã đăng ký (không gồm phí gửi xe).</p>
    </div>

    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show" role="alert" style="border-radius:10px;">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show" role="alert" style="border-radius:10px;">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${invoices == null or #lists.isEmpty(invoices)}" class="text-center py-5" style="color:#94a3b8;">
        <i class="bi bi-receipt-cutoff" style="font-size:2.5rem;"></i>
        <p class="mt-3 mb-0">Chưa có hóa đơn.</p>
    </div>

    <div class="row g-4" th:if="${invoices != null and !#lists.isEmpty(invoices)}">
        <div class="col-lg-6" th:each="inv : ${invoices}">
            <div class="card" style="border:none; border-radius:14px; box-shadow:0 2px 12px rgba(0,0,0,0.06);">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-start gap-3">
                        <div>
                            <h5 style="font-weight:800; color:#1e293b;" th:text="'Tháng ' + ${inv.monthDisplay}"></h5>
                            <div class="text-muted" style="font-size:0.9rem;">
                                Hạn cuối: <b th:text="${#temporals.format(inv.dueFinalDate, 'dd/MM/yyyy')}"></b>
                            </div>
                        </div>

                        <span th:if="${inv.status == 'GREEN'}" class="badge" style="background:#dcfce7;color:#16a34a;padding:8px 14px;border-radius:20px;font-weight:700;">
                            Đã thanh toán
                        </span>
                        <span th:if="${inv.status == 'YELLOW'}" class="badge" style="background:#fef3c7;color:#d97706;padding:8px 14px;border-radius:20px;font-weight:700;">
                            Chưa thanh toán (còn <span th:text="${inv.daysLeftOrOverdue}"></span> ngày)
                        </span>
                        <span th:if="${inv.status == 'RED'}" class="badge" style="background:#fee2e2;color:#dc2626;padding:8px 14px;border-radius:20px;font-weight:700;">
                            Quá hạn (<span th:text="${inv.daysLeftOrOverdue}"></span> ngày)
                        </span>
                    </div>

                    <div class="mt-4">
                        <div class="table-responsive mb-3" th:if="${inv.details != null and !#lists.isEmpty(inv.details)}">
                            <table class="table table-sm align-middle mb-0" style="font-size:0.86rem;">
                                <thead style="background:#f8fafc;">
                                <tr>
                                    <th>Khoản phí</th>
                                    <th>Loại</th>
                                    <th class="text-end">SL</th>
                                    <th class="text-end">Đơn giá</th>
                                    <th class="text-end">Thành tiền</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="d : ${inv.details}">
                                    <td>
                                        <div style="font-weight:600;" th:text="${d.title}"></div>
                                        <small class="text-muted" th:if="${d.note != null and !#strings.isEmpty(d.note)}" th:text="${d.note}"></small>
                                    </td>
                                    <td th:text="${d.lineType}"></td>
                                    <td class="text-end" th:text="${d.quantity != null ? d.quantity : 1}"></td>
                                    <td class="text-end" th:text="${#numbers.formatDecimal(d.unitPrice != null ? d.unitPrice : d.amount, 0, 'COMMA', 0, 'POINT')} + ' VND'"></td>
                                    <td class="text-end" style="font-weight:700;" th:text="${#numbers.formatDecimal(d.amount, 0, 'COMMA', 0, 'POINT')} + ' VND'"></td>
                                </tr>
                                </tbody>
                            </table>
                        </div>

                        <div class="d-flex justify-content-between">
                            <span class="text-muted">Chi phí tháng đó</span>
                            <b style="color:#059669;" th:text="${#numbers.formatDecimal(inv.monthAmount, 0, 'COMMA', 0, 'POINT')} + ' VND'"></b>
                        </div>
                        <div class="d-flex justify-content-between mt-2">
                            <span class="text-muted">Phí phạt</span>
                            <b style="color:#d97706;" th:text="${#numbers.formatDecimal(inv.penalty, 0, 'COMMA', 0, 'POINT')} + ' VND'"></b>
                        </div>
                        <div class="d-flex justify-content-between mt-3 pt-3 border-top">
                            <span style="font-weight:800; color:#1e293b;">Tổng phải thanh toán</span>
                            <b style="font-weight:900; color:#0d9488; font-size:1.1rem;"
                               th:text="${#numbers.formatDecimal(inv.totalToPay, 0, 'COMMA', 0, 'POINT')} + ' VND'"></b>
                        </div>
                    </div>

                    <div th:if="${inv.status != 'GREEN'}" class="mt-4 text-center">
                        <div th:with="bankId='tpb',
                  accountNo='10929112004',
                  template='qr_only',
                  amountVal=${inv.totalToPay},
                  infoText='HOADON' + ${inv.monthKey}">

                            <img th:attr="src='https://img.vietqr.io/image/' + ${bankId} + '-' + ${accountNo} + '-' + ${template} + '.png?amount=' + ${#numbers.formatDecimal(amountVal, 0, 0)} + '&addInfo=' + ${infoText}"
                                 style="width:250px; height:250px; object-fit:contain; border-radius:14px; background:#fff; padding:10px; border:1px solid #e5e7eb;"
                                 alt="QR thanh toán"/>

                            <p class="text-muted mt-2 mb-2">Quét QR để thanh toán tự động</p>

                            <form th:action="@{/hoa-don/pay/{monthKey}(monthKey=${inv.monthKey})}" method="post">
                                <button type="submit" class="btn btn-primary shadow-sm" style="border-radius:10px; padding:10px 22px; font-weight:700;">
                                    <i class="bi bi-shield-check me-1"></i> Xác nhận đã thanh toán
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
