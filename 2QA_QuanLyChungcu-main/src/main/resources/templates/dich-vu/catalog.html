<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Dịch vụ chung cư</title>
    <link rel="stylesheet" th:href="@{/css/dichvu/catalog.css}">
</head>
<body>
<div layout:fragment="content" class="container py-5">

    <div class="row align-items-center mb-5">
        <div class="col-md-8">
            <h2 class="display-6 fw-bold text-dark mb-2">
                <i class="bi bi-stars text-warning me-2"></i>Dịch vụ cư dân
            </h2>
            <p class="text-muted fs-5">Nâng tầm cuộc sống với các tiện ích đặc quyền dành riêng cho bạn.</p>
        </div>
    </div>

    <div th:if="${successMsg}" class="alert alert-success border-0 shadow-sm d-flex align-items-center mb-4 p-3" style="border-radius:15px;">
        <i class="bi bi-check-circle-fill fs-4 me-3"></i>
        <div class="fw-bold" th:text="${successMsg}"></div>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">
        <div class="col-lg-4 col-md-6" th:each="service : ${services}">
            <div class="service-card">

                <div class="img-wrapper">
                    <span th:if="${subscribedMap != null and subscribedMap.containsKey(service.id) and subscribedMap.get(service.id) and (isAdmin == null or !isAdmin)}"
                          class="badge-floating animate__animated animate__fadeIn">
                        <i class="bi bi-patch-check-fill me-1"></i>ĐÃ ĐĂNG KÝ
                    </span>

                    <img th:if="${service.imageUrl != null}" th:src="@{${service.imageUrl}}"
                         class="service-card-img" alt="service">
                    <div th:if="${service.imageUrl == null}" class="service-card-placeholder">
                        <i class="bi bi- lightning-charge-fill text-white" style="font-size:4rem; opacity: 0.6;"></i>
                    </div>
                </div>

                <div class="card-body">
                    <span class="category-tag" th:text="${service.category != null ? service.category.name : 'Tiện ích'}"></span>

                    <h5 class="service-title" th:text="${service.name}">Tên dịch vụ</h5>

                    <p class="text-muted mb-4" style="font-size:0.9rem; line-height: 1.6; flex-grow: 1;"
                       th:text="${#strings.length(service.description) > 90 ? #strings.substring(service.description, 0, 90) + '...' : service.description}">
                    </p>

                    <div class="d-flex justify-content-between align-items-center pt-3 border-top">
                        <div class="d-flex flex-column">
                            <span class="text-muted small fw-bold">Giá dịch vụ</span>
                            <span class="service-price">
                                <span th:text="${#numbers.formatDecimal(service.price, 0, 'POINT', 0, 'COMMA')}"></span>
                                <small style="font-size: 0.7rem; vertical-align: middle;"> VND</small>
                            </span>
                        </div>
                        <a th:href="@{/dich-vu/{id}(id=${service.id})}" class="btn btn-primary btn-view-detail shadow-sm">
                            Chi tiết <i class="bi bi-arrow-right-short ms-1"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(services)}" class="col-12 text-center py-5">
            <div class="bg-white rounded-4 p-5 shadow-sm inline-block">
                <i class="bi bi-search text-muted display-1"></i>
                <h4 class="mt-4 fw-bold text-dark">Hiện chưa có dịch vụ nào</h4>
                <p class="text-muted">Vui lòng quay lại sau hoặc liên hệ ban quản lý.</p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
