<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Dich vu chung cu</title>
    <style>
        .service-card {
            border: none;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            overflow: hidden;
            transition: all 0.3s ease;
            height: 100%;
        }
        .service-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        .service-card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        .service-card-placeholder {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #e0e7ff 0%, #f0f4ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .service-price {
            color: #059669;
            font-weight: 700;
            font-size: 1.15rem;
        }
        .badge-subscribed {
            background: #dcfce7;
            color: #16a34a;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div layout:fragment="content" class="container body-content">
    <div class="mt-4 mb-4">
        <h2 style="font-weight:700; color:#1e293b;">
            <i class="bi bi-grid-3x3-gap-fill me-2" style="color:#6366f1;"></i>Dich vu chung cu
        </h2>
        <p class="text-muted">Kham pha va dang ky cac dich vu tien ich cho cu dan</p>
    </div>

    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show" role="alert" style="border-radius:10px;">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show" role="alert" style="border-radius:10px;">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">
        <div class="col-lg-4 col-md-6" th:each="service : ${services}">
            <div class="card service-card">
                <img th:if="${service.imageUrl != null}" th:src="@{${service.imageUrl}}"
                     class="service-card-img" alt="service image">
                <div th:if="${service.imageUrl == null}" class="service-card-placeholder">
                    <i class="bi bi-image" style="font-size:3rem; color:#a5b4fc;"></i>
                </div>
                <div class="card-body p-3">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h5 class="card-title mb-0" style="font-weight:700; font-size:1.05rem;" th:text="${service.name}"></h5>
                        <span th:if="${subscribedMap != null and subscribedMap.containsKey(service.id) and subscribedMap.get(service.id) and (isAdmin == null or !isAdmin)}"
                              class="badge-subscribed">
                            <i class="bi bi-check-circle-fill me-1"></i>Da DK
                        </span>
                    </div>
                    <p class="card-text text-muted mb-2" style="font-size:0.88rem; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;"
                       th:text="${service.description}"></p>
                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <span class="service-price" th:text="${#numbers.formatDecimal(service.price, 0, 'COMMA', 0, 'POINT')} + ' VND'"></span>
                        <a th:href="@{/dich-vu/{id}(id=${service.id})}" class="btn btn-sm btn-primary" style="border-radius:8px; padding:6px 16px; font-weight:600;">
                            Xem chi tiet <i class="bi bi-arrow-right ms-1"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(services)}" class="col-12 text-center py-5" style="color:#94a3b8;">
            <i class="bi bi-inbox" style="font-size:3rem;"></i>
            <p class="mt-2">Chua co dich vu nao</p>
        </div>
    </div>
</div>
</body>
</html>
