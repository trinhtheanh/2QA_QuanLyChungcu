<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết dịch vụ chung cư</title>
    <link rel="stylesheet" th:href="@{/css/dichvu/detail.css}">
</head>
<body>
<div layout:fragment="content" class="container py-4">
    <div class="mb-4">
        <a th:href="@{/dich-vu}" class="btn btn-link text-muted p-0 text-decoration-none fw-bold small">
            <i class="bi bi-chevron-left"></i> QUAY LẠI DANH SÁCH
        </a>
    </div>

    <div th:if="${successMsg}" class="alert alert-success border-0 shadow-sm d-flex align-items-center p-3 mb-4" style="border-radius:16px;">
        <i class="bi bi-check-circle-fill fs-4 me-3 text-success"></i>
        <div th:text="${successMsg}" class="fw-bold"></div>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
    </div>

    <div class="service-detail-card mb-5">
        <div class="row g-0">
            <div class="col-lg-5 col-md-12">
                <div class="service-image-container">
                    <img th:if="${service.imageUrl != null}" th:src="@{${service.imageUrl}}" class="service-image" alt="service">
                    <div th:if="${service.imageUrl == null}" class="service-image d-flex align-items-center justify-content-center bg-light">
                        <i class="bi bi-image text-muted display-1"></i>
                    </div>
                </div>
            </div>

            <div class="col-lg-7 col-md-12">
                <div class="p-4 p-lg-5">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <h1 class="display-6 fw-extrabold text-dark m-0" th:text="${service.name}">Tên dịch vụ</h1>
                        <div sec:authorize="hasRole('ADMIN')" class="badge bg-soft-primary text-primary px-3 py-2 rounded-pill border border-primary border-opacity-25" style="background: #eef2ff;">
                            <i class="bi bi-shield-lock me-1"></i> Mode Quản trị
                        </div>
                    </div>

                    <div class="mb-4">
                        <div class="price-badge">
                            <span th:text="${#numbers.formatDecimal(service.price, 0, 'POINT', 0, 'COMMA')}"></span>
                            <small class="ms-1" style="font-size: 0.7rem; opacity: 0.9;">₫ / THÁNG</small>
                        </div>
                    </div>

                    <div class="mb-5">
                        <h6 class="text-uppercase fw-bold text-muted small mb-3" style="letter-spacing: 1px;">Mô tả chi tiết</h6>
                        <p class="fs-6 text-secondary lh-lg" th:text="${service.description}" style="white-space:pre-line;"></p>
                    </div>

                    <div class="pt-4 border-top">
                        <div class="mb-4 d-flex align-items-center p-3 rounded-4 bg-light" sec:authorize="hasRole('ADMIN')">
                            <div class="bg-primary rounded-circle p-2 me-3">
                                <i class="bi bi-people-fill text-white"></i>
                            </div>
                            <div>
                                <div class="text-muted small fw-bold">Tổng lượt sử dụng</div>
                                <div class="h5 m-0 fw-bold" th:text="${#lists.size(subscriptions)} + ' Cư dân'"></div>
                            </div>
                        </div>

                        <div th:if="${isSubscribed != null and isSubscribed and (isAdmin == null or !isAdmin)}"
                             class="d-flex align-items-center p-3 rounded-4" style="background: #ecfdf5; border: 1px solid #10b981;">
                            <i class="bi bi-patch-check-fill fs-4 text-success me-3"></i>
                            <div class="text-success fw-bold">Bạn hiện đang sử dụng dịch vụ tiện ích này.</div>
                        </div>

                        <form th:if="${(isSubscribed == null or !isSubscribed) and (isAdmin == null or !isAdmin)}"
                              th:action="@{/dich-vu/subscribe/{id}(id=${service.id})}" method="post">
                            <button type="submit" class="btn btn-subscribe shadow-lg">
                                <i class="bi bi-plus-circle me-2"></i> ĐĂNG KÝ NGAY
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div sec:authorize="hasRole('ADMIN')" class="animate__animated animate__fadeInUp">
        <div class="d-flex align-items-center mb-3">
            <h4 class="fw-bold m-0"><i class="bi bi-list-stars me-2 text-primary"></i>Danh sách đăng ký</h4>
        </div>

        <div class="admin-table bg-white shadow-sm overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                    <tr>
                        <th class="text-center">STT</th>
                        <th>Cư dân</th>
                        <th>Thông tin phòng</th>
                        <th>Thời gian đăng ký</th>
                        <th>Thanh toán</th>
                        <th class="text-center">Trạng thái</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="sub, iterStat : ${subscriptions}">
                        <td class="text-center fw-bold text-muted" th:text="${iterStat.count}"></td>
                        <td>
                            <div class="fw-bold" th:text="${sub.user.login_name}"></div>
                        </td>
                        <td>
                            <div th:if="${sub.user.chungCu != null}" class="small">
                                <i class="bi bi-house-door text-primary me-1"></i>
                                <span th:text="${sub.user.chungCu.name}"></span>
                            </div>
                            <span th:unless="${sub.user.chungCu != null}" class="badge bg-light text-muted">N/A</span>
                        </td>
                        <td class="small text-muted" th:text="${#temporals.format(sub.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                        <td>
                                <span th:if="${paymentMap.containsKey(sub.id)}" class="fw-bold text-dark"
                                      th:text="${#numbers.formatDecimal(paymentMap.get(sub.id).amount, 0, 'POINT', 0, 'COMMA')} + ' ₫'"></span>
                        </td>
                        <td class="text-center">
                            <div th:if="${paymentMap.containsKey(sub.id)}">
                                    <span th:if="${paymentMap.get(sub.id).status == 'DA_THANH_TOAN'}" class="status-badge bg-success bg-opacity-10 text-success">
                                        <i class="bi bi-check-circle-fill"></i> Đã thanh toán
                                    </span>
                                <span th:if="${paymentMap.get(sub.id).status == 'CHUA_THANH_TOAN'}" class="status-badge bg-danger bg-opacity-10 text-danger">
                                        <i class="bi bi-clock-history"></i> Chờ xử lý
                                    </span>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
