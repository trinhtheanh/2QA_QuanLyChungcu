<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
</head>
<body>
<div layout:fragment="content" class="container body-content">
    <h2 class="mt-3 mb-3">&#9998; Sua thong bao</h2>

    <form th:action="@{/thongbao/save}" method="post" th:object="${thongbao}">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label for="loaiThongBao" class="form-label fw-bold">Loai thong bao</label>
            <select class="form-select" id="loaiThongBao" th:field="*{loaiThongBao}" required
                    onchange="toggleScheduleFields()">
                <option value="THONG_BAO_CHUNG">&#128226; Thong bao chung</option>
                <option value="LICH_CAT_DIEN_NUOC">&#9889; Lich cat dien nuoc</option>
                <option value="LICH_BAO_TRI">&#128736; Lich bao tri</option>
                <option value="NOI_QUY">&#128220; Noi quy / Quy dinh</option>
                <option value="TIN_KHAN_CAP">&#128680; Tin khan cap</option>
            </select>
        </div>

        <div class="mb-3">
            <label for="tieuDe" class="form-label fw-bold">Tieu de</label>
            <input type="text" class="form-control" id="tieuDe" th:field="*{tieuDe}"
                   placeholder="Nhap tieu de thong bao" required>
        </div>

        <div class="mb-3">
            <label for="noiDung" class="form-label fw-bold">Noi dung</label>
            <textarea class="form-control" id="noiDung" th:field="*{noiDung}" rows="6"
                      placeholder="Nhap noi dung chi tiet..." required></textarea>
        </div>

        <!-- === CAC TRUONG CHO LICH BAO TRI / CAT DIEN NUOC === -->
        <div id="scheduleFields" style="display:none; background:#fffbeb; border:1px solid #fde68a; border-radius:10px; padding:20px; margin-bottom:16px;">
            <h6 class="fw-bold mb-3" style="color:#92400e;"><i class="bi bi-calendar-event me-2"></i>Thong tin lich trinh</h6>

            <div class="row g-3">
                <div class="col-md-4">
                    <label for="schedDate" class="form-label fw-bold">Ngay</label>
                    <input type="date" class="form-control" id="schedDate" name="schedDate"
                           th:value="${thongbao.ngayTao != null ? #temporals.format(thongbao.ngayTao, 'yyyy-MM-dd') : ''}">
                </div>
                <div class="col-md-2">
                    <label for="schedHour" class="form-label fw-bold">Gio</label>
                    <input type="number" class="form-control" id="schedHour" name="schedHour" min="0" max="23" placeholder="HH"
                           th:value="${thongbao.ngayTao != null ? thongbao.ngayTao.hour : ''}">
                </div>
                <div class="col-md-2">
                    <label for="schedMinute" class="form-label fw-bold">Phut</label>
                    <input type="number" class="form-control" id="schedMinute" name="schedMinute" min="0" max="59" placeholder="MM"
                           th:value="${thongbao.ngayTao != null ? thongbao.ngayTao.minute : ''}">
                </div>
                <div class="col-md-4">
                    <label for="khuChungCu" class="form-label fw-bold">Khu chung cu</label>
                    <select class="form-select" id="khuChungCu" th:field="*{khuChungCu}">
                        <option value="">-- Toan bo chung cu --</option>
                        <option th:each="cat : ${categories}" th:value="${cat.name}" th:text="${cat.name}"></option>
                    </select>
                </div>
            </div>
        </div>

        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="ghim" th:field="*{ghim}">
            <label class="form-check-label" for="ghim">&#128204; Ghim thong bao len dau</label>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Cap nhat thong bao</button>
            <a th:href="@{/thongbao}" class="btn btn-outline-secondary">Huy</a>
        </div>
    </form>

    <script th:inline="javascript">
function toggleScheduleFields() {
    var loai = document.getElementById('loaiThongBao').value;
    var fields = document.getElementById('scheduleFields');
    if (loai === 'LICH_CAT_DIEN_NUOC' || loai === 'LICH_BAO_TRI') {
        fields.style.display = 'block';
    } else {
        fields.style.display = 'none';
    }
}
document.addEventListener('DOMContentLoaded', toggleScheduleFields);
</script>
</div>
</body>
</html>
