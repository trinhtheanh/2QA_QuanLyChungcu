<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
</head>
<body>
<div layout:fragment="content" class="container py-4 mt-5">
    <div class="form-container">

        <div class="form-header">
            <h2><i class="bi bi-pencil-square text-warning"></i> Chỉnh sửa thông báo</h2>
            <p class="text-muted mb-0">Cập nhật nội dung hoặc thay đổi trạng thái ghim cho thông báo #[[${thongbao.id}]].</p>
        </div>

        <form th:action="@{/thongbao/save}" method="post" th:object="${thongbao}">
            <input type="hidden" th:field="*{id}">

            <div class="row mb-4">
                <div class="col-md-6 mb-3">
                    <label for="loaiThongBao" class="form-label">Loại thông báo</label>
                    <select class="form-select" id="loaiThongBao" th:field="*{loaiThongBao}" required
                            onchange="toggleScheduleFields()">
                        <option value="THONG_BAO_CHUNG">📢 Thông báo chung</option>
                        <option value="LICH_CAT_DIEN_NUOC">⚡ Lịch cắt điện nước</option>
                        <option value="LICH_BAO_TRI">🛠️ Lịch bảo trì</option>
                        <option value="NOI_QUY">📜 Nội quy / Quy định</option>
                        <option value="TIN_KHAN_CAP">🚨 Tin khẩn cấp</option>
                    </select>
                </div>

                <div class="col-md-6 d-flex align-items-center pt-3">
                    <div class="form-check form-switch p-3 border rounded-3 w-100" style="background: #f8fafc;">
                        <input type="checkbox" class="form-check-input ms-0 me-3" id="ghim" th:field="*{ghim}" style="width: 3em; height: 1.5em; cursor:pointer;">
                        <label class="form-check-label fw-bold" for="ghim" style="cursor:pointer;"> 📌 Ghim thông báo lên đầu</label>
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <label for="tieuDe" class="form-label">Tiêu đề thông báo</label>
                <input type="text" class="form-control" id="tieuDe" th:field="*{tieuDe}"
                       placeholder="Nhập tiêu đề thông báo" required>
            </div>

            <div class="mb-4">
                <label for="noiDung" class="form-label">Nội dung chi tiết</label>
                <textarea class="form-control" id="noiDung" th:field="*{noiDung}" rows="6"
                          placeholder="Nhập nội dung chi tiết..." required></textarea>
            </div>

            <div id="scheduleFields" class="p-4 mb-4 shadow-sm" style="display:none;">
                <h6 class="fw-bold mb-3" style="color:#92400e;">
                    <i class="bi bi-calendar-event me-2"></i>Thông tin lịch trình cập nhật
                </h6>

                <div class="row g-3">
                    <div class="col-md-4">
                        <label for="schedDate" class="form-label">Ngày áp dụng</label>
                        <input type="date" class="form-control" id="schedDate" name="schedDate"
                               th:value="${thongbao.ngayTao != null ? #temporals.format(thongbao.ngayTao, 'yyyy-MM-dd') : ''}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Thời gian (Giờ : Phút)</label>
                        <div class="input-group">
                            <input type="number" class="form-control" id="schedHour" name="schedHour" min="0" max="23" placeholder="HH"
                                   th:value="${thongbao.ngayTao != null ? thongbao.ngayTao.hour : ''}">
                            <span class="input-group-text">:</span>
                            <input type="number" class="form-control" id="schedMinute" name="schedMinute" min="0" max="59" placeholder="MM"
                                   th:value="${thongbao.ngayTao != null ? thongbao.ngayTao.minute : ''}">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <label for="khuChungCu" class="form-label">Khu chung cư</label>
                        <select class="form-select" id="khuChungCu" th:field="*{khuChungCu}">
                            <option value="">-- Toàn bộ chung cư --</option>
                            <option th:each="cat : ${categories}" th:value="${cat.name}" th:text="${cat.name}"></option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-center gap-3 pt-4 border-top">
                <button type="submit" class="btn-modern btn-update shadow">
                    <i class="bi bi-arrow-repeat"></i> Cập nhật thông báo
                </button>
                <a th:href="@{/thongbao}" class="btn-modern btn-outline-secondary">
                    <i class="bi bi-x-circle"></i> Hủy bỏ
                </a>
            </div>
        </form>
    </div>
</div>

<script th:src="@{/js/thongbao-form.js}" defer></script>
</body>
</html>
