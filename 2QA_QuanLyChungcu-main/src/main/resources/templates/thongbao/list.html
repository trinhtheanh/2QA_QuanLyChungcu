<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/tbao/list.css}">
</head>
<body>
<div layout:fragment="content" class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold text-dark m-0" style="letter-spacing: -1px;">
                <i class="bi bi-megaphone-fill text-primary me-2"></i>Quản lý thông báo
            </h2>
            <p class="text-muted small mb-0">Thông tin truyền tải đến cư dân toàn tòa nhà.</p>
        </div>
        <a th:href="@{/thongbao/add}" class="btn btn-primary btn-add-new">
            <i class="bi bi-plus-lg me-1"></i> Thêm thông báo mới
        </a>
    </div>

    <div th:if="${successMsg}" class="alert alert-success border-0 shadow-sm mb-4 d-flex align-items-center"
         style="border-radius: 12px; background: #f0fdf4; color: #166534;">
        <i class="bi bi-check-circle-fill me-2 fs-5"></i>
        <span th:text="${successMsg}"></span>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${errorMsg}" class="alert alert-danger border-0 shadow-sm mb-4 d-flex align-items-center"
         style="border-radius: 12px; background: #fef2f2; color: #991b1b;">
        <i class="bi bi-exclamation-triangle-fill me-2 fs-5"></i>
        <span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
    </div>

    <div class="content-card">
        <div class="table-responsive">
            <table class="table custom-table table-hover mb-0">
                <thead>
                <tr>
                    <th class="text-center" style="width: 5%">Mã</th>
                    <th style="width: 30%">Nội dung thông báo</th>
                    <th style="width: 15%">Loại tin</th>
                    <th style="width: 15%">Thời gian</th>
                    <th style="width: 15%">Người tạo</th>
                    <th class="text-center" style="width: 20%">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="tb : ${thongbaos}">
                    <td class="text-center fw-bold text-muted" th:text="${tb.id}"></td>
                    <td>
                        <div class="d-flex flex-column">
                            <div class="fw-bold text-dark d-flex align-items-center mb-1">
                                <i th:if="${tb.ghim}" class="bi bi-pin-angle-fill text-warning me-2" title="Đã ghim"></i>
                                <span th:text="${tb.tieuDe}"></span>
                            </div>
                            <div th:if="${tb.loaiThongBao == 'TIN_KHAN_CAP'}" class="text-danger small fw-bold">
                                <i class="bi bi-exclamation-octagon-fill"></i> KHẨN CẤP
                            </div>
                        </div>
                    </td>
                    <td>
                            <span th:if="${tb.loaiThongBao == 'THONG_BAO_CHUNG'}" class="badge-modern bg-info text-dark">
                                <i class="bi bi-info-circle"></i> Chung</span>
                        <span th:if="${tb.loaiThongBao == 'LICH_CAT_DIEN_NUOC'}" class="badge-modern bg-warning text-dark">
                                <i class="bi bi-lightning-slash"></i> Cắt điện/nước</span>
                        <span th:if="${tb.loaiThongBao == 'NOI_QUY'}" class="badge-modern bg-secondary text-white">
                                <i class="bi bi-journal-check"></i> Nội quy</span>
                        <span th:if="${tb.loaiThongBao == 'TIN_KHAN_CAP'}" class="badge-modern bg-danger text-white">
                                <i class="bi bi-shield-exclamation"></i> Khẩn cấp</span>
                    </td>
                    <td>
                        <div class="text-dark small">
                            <i class="bi bi-calendar3 me-1"></i>
                            <span th:text="${#temporals.format(tb.ngayTao, 'dd/MM/yyyy')}"></span>
                        </div>
                        <div class="text-muted" style="font-size: 0.75rem;" th:text="${#temporals.format(tb.ngayTao, 'HH:mm')}"></div>
                    </td>
                    <td class="text-muted small">
                        <i class="bi bi-person-circle me-1"></i> <span th:text="${tb.nguoiTao}"></span>
                    </td>
                    <td class="text-center">
                        <div class="d-flex justify-content-center gap-2">
                            <a th:href="@{/thongbao/edit/{id}(id=${tb.id})}"
                               class="btn btn-outline-secondary btn-action" title="Chỉnh sửa">
                                <i class="bi bi-pencil-square"></i>
                            </a>
                            <a th:href="@{/thongbao/delete/{id}(id=${tb.id})}"
                               class="btn btn-outline-danger btn-action"
                               onclick="return confirm('Bạn có chắc chắn muốn xóa thông báo này?');" title="Xóa">
                                <i class="bi bi-trash3"></i>
                            </a>
                        </div>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(thongbaos)}">
                    <td colspan="6" class="text-center py-5">
                        <i class="bi bi-inbox text-muted fs-1"></i>
                        <p class="mt-2 text-muted mb-0">Hiện chưa có thông báo nào được đăng.</p>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
