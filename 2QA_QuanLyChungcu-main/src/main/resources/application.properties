server.port=${PORT:8090}

spring.application.name=bai6_springsecurity
spring.datasource.url=${DB_URL:jdbc:h2:mem:quanlychungcu;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

spring.jpa.hibernate.ddl-auto=update

#####

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:googleid}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:google_client_id}

spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
