<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{_layout}">
<head>
  <meta charset="UTF-8">
  <style>
    .tb-card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 4px 24px rgba(30,64,175,0.08); overflow: hidden;
      transition: all 0.3s ease; height: 100%; display: flex; flex-direction: column;
    }
    .tb-card:hover { transform: translateY(-4px); box-shadow: 0 8px 32px rgba(30,64,175,0.16); }
    .tb-card .card-stripe { height: 4px; width: 100%; }
    .tb-card .card-stripe.stripe-info { background: linear-gradient(90deg, #3b82f6, #06b6d4); }
    .tb-card .card-stripe.stripe-warning { background: linear-gradient(90deg, #f59e0b, #f97316); }
    .tb-card .card-stripe.stripe-secondary { background: linear-gradient(90deg, #6b7280, #9ca3af); }
    .tb-card .card-stripe.stripe-danger { background: linear-gradient(90deg, #dc2626, #f43f5e); }
    .tb-card .card-inner { padding: 20px; flex: 1; display: flex; flex-direction: column; }
    .tb-card .card-meta {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: auto; padding-top: 12px; border-top: 1px solid #f1f5f9;
      font-size: 0.8rem; color: #64748b;
    }
    .tb-card h5 { font-weight: 600; font-size: 1rem; margin-bottom: 8px; }
    .tb-card .card-desc { font-size: 0.88rem; color: #64748b; line-height: 1.6; flex: 1; }
    .btn-detail {
      background: linear-gradient(135deg, #1e40af, #0ea5e9);
      color: #fff; border: none; border-radius: 8px;
      padding: 6px 16px; font-size: 0.8rem; font-weight: 600;
      text-decoration: none; transition: all 0.2s;
    }
    .btn-detail:hover { color: #fff; filter: brightness(1.1); }
    .badge-ghim {
      background: linear-gradient(135deg, #f59e0b, #f97316);
      color: #fff; font-size: 0.7rem; padding: 3px 8px; border-radius: 6px; font-weight: 600;
    }
    .tb-hero {
      background: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #06b6d4 100%);
      border-radius: 20px; padding: 40px; color: #fff;
      margin-bottom: 32px; position: relative; overflow: hidden;
    }
    .tb-hero::before {
      content: ''; position: absolute; top: -50%; right: -20%;
      width: 400px; height: 400px; background: rgba(255,255,255,0.05); border-radius: 50%;
    }
    .tb-hero h1 { font-weight: 800; font-size: 2rem; margin-bottom: 8px; position: relative; }
    .tb-hero p { opacity: 0.85; font-size: 1.05rem; position: relative; }
  </style>
</head>
<body>

<div layout:fragment="content" class="container body-content" style="padding-top: 24px; padding-bottom: 40px;">

  <!-- Hero banner -->
  <div class="tb-hero">
    <h1><i class="bi bi-bell-fill me-2"></i>Thong bao tu Ban Quan Ly</h1>
    <p>Tat ca thong bao, noi quy, tin khan cap va thong tin quan trong tu ban quan ly chung cu.</p>
  </div>

  <!-- Thong bao cards -->
  <div class="row g-3" th:if="${thongbaos != null and !thongbaos.isEmpty()}">
    <div class="col-lg-4 col-md-6" th:each="tb : ${thongbaos}">
      <div class="tb-card">
        <div th:if="${tb.loaiThongBao == 'THONG_BAO_CHUNG'}" class="card-stripe stripe-info"></div>
        <div th:if="${tb.loaiThongBao == 'LICH_CAT_DIEN_NUOC'}" class="card-stripe stripe-warning"></div>
        <div th:if="${tb.loaiThongBao == 'NOI_QUY'}" class="card-stripe stripe-secondary"></div>
        <div th:if="${tb.loaiThongBao == 'TIN_KHAN_CAP'}" class="card-stripe stripe-danger"></div>
        <div class="card-inner">
          <div class="d-flex justify-content-between align-items-start mb-2">
            <span th:if="${tb.loaiThongBao == 'THONG_BAO_CHUNG'}" class="badge" style="background:#dbeafe;color:#1d4ed8;font-size:0.75rem;">
              <i class="bi bi-info-circle"></i> Thong bao chung
            </span>
            <span th:if="${tb.loaiThongBao == 'LICH_CAT_DIEN_NUOC'}" class="badge" style="background:#fef3c7;color:#92400e;font-size:0.75rem;">
              <i class="bi bi-lightning-fill"></i> Lich cat dien/nuoc
            </span>
            <span th:if="${tb.loaiThongBao == 'NOI_QUY'}" class="badge" style="background:#f1f5f9;color:#475569;font-size:0.75rem;">
              <i class="bi bi-journal-text"></i> Noi quy
            </span>
            <span th:if="${tb.loaiThongBao == 'TIN_KHAN_CAP'}" class="badge" style="background:#fee2e2;color:#dc2626;font-size:0.75rem;">
              <i class="bi bi-exclamation-triangle-fill"></i> Khan cap
            </span>
            <span th:if="${tb.ghim}" class="badge-ghim"><i class="bi bi-pin-angle-fill"></i> Ghim</span>
          </div>
          <h5 th:text="${tb.tieuDe}"></h5>
          <p class="card-desc" th:if="${tb.noiDung != null}"
             th:text="${#strings.length(tb.noiDung) > 100 ? #strings.substring(tb.noiDung, 0, 100) + '...' : tb.noiDung}">
          </p>
          <div class="card-meta">
            <span><i class="bi bi-calendar3 me-1"></i><span th:text="${#temporals.format(tb.ngayTao, 'dd/MM/yyyy HH:mm')}"></span></span>
            <a href="#" class="btn-detail"><i class="bi bi-eye me-1"></i>Xem chi tiet</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Empty state -->
  <div th:if="${thongbaos == null or thongbaos.isEmpty()}" class="text-center py-5">
    <i class="bi bi-bell-slash" style="font-size:4rem;color:#cbd5e1;"></i>
    <h4 class="mt-3" style="color:#64748b;">Chua co thong bao nao</h4>
    <p class="text-muted">Thong bao tu ban quan ly se hien thi tai day.</p>
  </div>
</div>
</body>
</html>
