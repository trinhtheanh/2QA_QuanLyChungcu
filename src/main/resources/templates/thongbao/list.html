<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
</head>
<body>
<div layout:fragment="content" class="container body-content">
    <h2 class="mt-3 mb-3">
        <span style="margin-right:8px;">&#128227;</span> Quan ly thong bao chung cu
    </h2>

    <!-- Thong bao thanh cong / loi -->
    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

    <div class="mb-3">
        <a th:href="@{/thongbao/add}" class="btn btn-primary">
            &#10010; Them thong bao moi
        </a>
    </div>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th style="width:5%">Ma</th>
            <th style="width:25%">Tieu de</th>
            <th style="width:15%">Loai</th>
            <th style="width:12%">Ngay tao</th>
            <th style="width:12%">Nguoi tao</th>
            <th style="width:8%">Ghim</th>
            <th style="width:23%">Hanh dong</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="tb : ${thongbaos}">
            <td th:text="${tb.id}"></td>
            <td>
                <span th:if="${tb.loaiThongBao == 'TIN_KHAN_CAP'}"
                      class="badge bg-danger me-1">Khan cap</span>
                <span th:if="${tb.ghim}" class="badge bg-warning text-dark me-1">&#128204; Ghim</span>
                <span th:text="${tb.tieuDe}"></span>
            </td>
            <td>
                <span th:if="${tb.loaiThongBao == 'THONG_BAO_CHUNG'}" class="badge bg-info text-dark">Thong bao chung</span>
                <span th:if="${tb.loaiThongBao == 'LICH_CAT_DIEN_NUOC'}" class="badge bg-warning text-dark">Lich cat dien/nuoc</span>
                <span th:if="${tb.loaiThongBao == 'NOI_QUY'}" class="badge bg-secondary">Noi quy / Quy dinh</span>
                <span th:if="${tb.loaiThongBao == 'TIN_KHAN_CAP'}" class="badge bg-danger">Tin khan cap</span>
            </td>
            <td th:text="${#temporals.format(tb.ngayTao, 'dd/MM/yyyy HH:mm')}"></td>
            <td th:text="${tb.nguoiTao}"></td>
            <td>
                <span th:if="${tb.ghim}" style="color:green;font-weight:bold;">Co</span>
                <span th:unless="${tb.ghim}" style="color:#aaa;">Khong</span>
            </td>
            <td>
                <a th:href="@{/thongbao/edit/{id}(id=${tb.id})}" class="btn btn-secondary btn-sm">Sua</a>
                <a th:href="@{/thongbao/delete/{id}(id=${tb.id})}" class="btn btn-danger btn-sm"
                   onclick="return confirm('Ban co chac muon xoa thong bao nay?');">Xoa</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(thongbaos)}">
            <td colspan="7" class="text-center text-muted">Chua co thong bao nao.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
