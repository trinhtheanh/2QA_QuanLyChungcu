<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Sua loai chung cu</title>
</head>
<body>
<div layout:fragment="content" class="container body-content">
    <h2 class="mt-3 mb-3">Sua loai chung cu</h2>

    <form th:action="@{/categories/save}" th:object="${category}" method="post" class="form" style="max-width:500px;">
        <input type="hidden" th:field="*{id}"/>
        <div class="form-group mb-3">
            <label for="name">Ten loai chung cu:</label>
            <input class="form-control" type="text" th:field="*{name}" id="name" required>
        </div>
        <a th:href="@{/categories}" class="btn btn-secondary">Huy</a>
        <button type="submit" class="btn btn-success">Cap nhat</button>
    </form>
</div>
</body>
</html>
